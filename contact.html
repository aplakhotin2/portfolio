<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme=dark]{
  color-scheme:dark;
  --color-bg-primary:#14150d;
  --color-bg-secondary:#1c1e16;
  --color-bg-tertiary:#232620;
  --color-bg-surface:rgba(255,255,255,0.03);
  --color-bg-surface-hover:rgba(255,255,255,0.06);
  --color-accent-warm:#F18A4A;
  --color-accent-warm-hover:#F4A070;
  --color-text-primary:#e8e3d8;
  --color-text-secondary:#a8a398;
  --color-text-tertiary:#6e6b63;
  --color-text-inverse:#14150d;
  --color-border:rgba(255,255,255,0.08);
  --color-border-hover:rgba(255,255,255,0.15);
  --color-success:#8a9e8f;
  --shadow-lg:0 8px 30px rgba(0,0,0,0.5);
  --shadow-xl:0 16px 50px rgba(0,0,0,0.6);
}
[data-theme=light]{
  color-scheme:light;
  --color-bg-primary:#f2f0e8;
  --color-bg-secondary:#f9f7f1;
  --color-bg-tertiary:#e8e5dc;
  --color-bg-surface:rgba(0,0,0,0.025);
  --color-bg-surface-hover:rgba(0,0,0,0.05);
  --color-accent-warm:#F18A4A;
  --color-accent-warm-hover:#D4712E;
  --color-text-primary:#1a1b14;
  --color-text-secondary:#524f45;
  --color-text-tertiary:#7a7670;
  --color-text-inverse:#f9f7f1;
  --color-border:rgba(0,0,0,0.08);
  --color-border-hover:rgba(0,0,0,0.15);
  --color-success:#5e8464;
  --shadow-lg:0 8px 30px rgba(0,0,0,0.09);
  --shadow-xl:0 16px 50px rgba(0,0,0,0.11);
}
:root{
  --font:'Inter',system-ui,sans-serif;
  --nav-height:72px;
  --ease-out-expo:cubic-bezier(0.16,1,0.3,1);
  --duration-fast:150ms;
  --duration-slower:800ms;
}

html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{font-family:var(--font);font-size:16px;line-height:1.6;color:var(--color-text-primary);background:var(--color-bg-primary);transition:background .5s,color .5s;display:flex;flex-direction:column;min-height:100vh}
a{color:inherit;text-decoration:none}
img{max-width:100%;height:auto;display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── HOME LOGO ── */
.home-logo{position:fixed;top:28px;left:40px;z-index:1000;display:flex;align-items:center;padding:12px 20px;background:var(--color-bg-secondary);border:1px solid var(--color-border);border-radius:9999px;backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);box-shadow:var(--shadow-lg);transition:border-color var(--duration-fast),box-shadow var(--duration-fast)}
.home-logo:hover{border-color:var(--color-border-hover);box-shadow:var(--shadow-xl)}
.navbar__logo-svg{height:32px;width:auto;color:var(--color-text-primary)}

/* ── NAV CLUSTER ── */
.nav-cluster{position:fixed;top:28px;right:28px;z-index:1000;display:flex;align-items:center;gap:10px}
.navbar-pill{position:static;display:flex;align-items:center;padding:12px 20px 12px 12px;background:var(--color-bg-secondary);border:1px solid var(--color-border);border-radius:9999px;backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);box-shadow:var(--shadow-lg);transition:border-color var(--duration-fast),box-shadow var(--duration-fast)}
.navbar-pill:hover{border-color:var(--color-border-hover);box-shadow:var(--shadow-xl)}
.navbar-pill__links{display:flex;align-items:center;gap:20px}
.navbar-pill__link{font-size:14px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.05em;text-transform:uppercase;transition:color var(--duration-fast)}
.navbar-pill__link:hover,.navbar-pill__link--active{color:var(--color-text-primary)}
.navbar-pill__contact{font-size:14px;font-weight:600;color:#fff;background:var(--color-accent-warm);padding:8px 16px;border-radius:9999px;letter-spacing:0.05em;text-transform:uppercase;transition:background var(--duration-fast),transform var(--duration-fast)}
.navbar-pill__contact:hover{background:var(--color-accent-warm-hover);transform:translateY(-1px)}
[data-theme=light] .navbar-pill__contact{background:var(--color-text-primary);color:var(--color-text-inverse)}
[data-theme=light] .navbar-pill__contact:hover{background:var(--color-text-secondary)}

/* ── THEME TOGGLE ── */
.theme-toggle{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:9999px;background:var(--color-bg-surface);border:1px solid var(--color-border);color:var(--color-text-secondary);cursor:pointer;transition:border-color var(--duration-fast),background var(--duration-fast),color var(--duration-fast)}
.theme-toggle:hover{border-color:var(--color-border-hover);background:var(--color-bg-surface-hover);color:var(--color-text-primary)}
.theme-toggle__icon{width:18px;height:18px}
.theme-toggle__icon--sun{display:block}
.theme-toggle__icon--moon{display:none}
[data-theme=light] .theme-toggle__icon--sun{display:none}
[data-theme=light] .theme-toggle__icon--moon{display:block}

/* ── LAYOUT ── */
main{padding-top:var(--nav-height);flex:1;display:flex;flex-direction:column}
.contact-wrap{width:100%;max-width:600px;padding:40px 24px;margin:auto}

/* ── HERO ── */
.contact-hero{margin-bottom:24px}
.contact-hero__eyebrow{display:flex;align-items:center;gap:10px;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:12px}
.contact-hero__eyebrow::before{content:'';display:inline-block;width:24px;height:1.5px;background:currentColor;flex-shrink:0}
.contact-hero__heading{font-size:clamp(28px,3.5vw,48px);font-weight:800;letter-spacing:-0.04em;line-height:1.05;color:var(--color-text-primary);margin-bottom:10px}
.contact-hero__sub{font-size:15px;color:var(--color-text-secondary);line-height:1.65;max-width:480px}

/* ── CHANNEL PILLS ── */
.contact-channels{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.channel-card{display:inline-flex;align-items:center;gap:8px;padding:10px 28px 10px 20px;background:var(--color-bg-secondary);border:1px solid var(--color-border);border-radius:9999px;transition:border-color var(--duration-fast),background var(--duration-fast),transform var(--duration-fast);text-decoration:none}
.channel-card:hover{border-color:var(--color-border-hover);background:var(--color-bg-surface-hover);transform:translateY(-1px)}
.channel-card--tg{}
.channel-card--li{}
.channel-card__icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--color-text-secondary)}
.channel-card__icon svg{width:14px;height:14px}
.channel-card__label{font-size:14px;font-weight:500;color:var(--color-text-primary)}

/* ── DIVIDER ── */
.contact-divider{display:flex;align-items:center;gap:14px;margin-bottom:24px;width:100%;color:var(--color-text-tertiary);font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase}
.contact-divider::before,.contact-divider::after{content:'';flex:1;height:1px;background:var(--color-border)}

/* ── FORM ── */
.contact-form{width:100%}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-label{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.form-input,.form-textarea{width:100%;padding:13px 16px;background:var(--color-bg-secondary);border:1px solid var(--color-border);border-radius:12px;font-family:var(--font);font-size:15px;color:var(--color-text-primary);outline:none;transition:border-color var(--duration-fast),box-shadow var(--duration-fast)}
.form-input::placeholder,.form-textarea::placeholder{color:var(--color-text-tertiary)}
.form-input:focus,.form-textarea:focus{border-color:var(--color-border-hover);box-shadow:0 0 0 3px rgba(241,138,74,0.1)}
.form-textarea{resize:vertical;min-height:140px;line-height:1.6}
.form-submit{display:inline-flex;align-items:center;gap:8px;background:var(--color-text-primary);color:var(--color-text-inverse);font-family:var(--font);font-size:15px;font-weight:600;letter-spacing:0.01em;padding:14px 28px;border-radius:9999px;border:none;cursor:pointer;transition:opacity var(--duration-fast),transform var(--duration-fast)}
.form-submit:hover{opacity:0.8;transform:translateY(-1px)}
[data-theme=dark] .form-submit{background:var(--color-accent-warm);color:#fff}
[data-theme=dark] .form-submit:hover{background:var(--color-accent-warm-hover);opacity:1}

/* ── FOOTER ── */
.page-footer{padding:16px 24px;margin-top:auto}
.footer-bottom{font-size:11px;color:var(--color-text-tertiary)}
.footer-bottom a{color:inherit;text-decoration:underline;text-underline-offset:2px}

/* ── REVEAL ── */
.reveal{opacity:0;transform:translateY(24px);transition:opacity var(--duration-slower) var(--ease-out-expo),transform var(--duration-slower) var(--ease-out-expo)}
.reveal.visible{opacity:1;transform:none}
.reveal-delay-1{transition-delay:100ms}
.reveal-delay-2{transition-delay:200ms}
.reveal-delay-3{transition-delay:300ms}

/* ── PAGE TRANSITION ── */
@keyframes slide-in{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slide-out{from{opacity:1}to{opacity:0;transform:translateX(-20px)}}
main{animation:slide-in .5s cubic-bezier(.16,1,.3,1) both}
body.page-exiting main{animation:slide-out .3s ease forwards}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .contact-wrap{padding:48px 20px 32px}
  .home-logo{top:12px;left:20px;padding:8px 14px}
  .nav-cluster{top:12px;right:16px}
  .navbar-pill{padding:8px 12px 8px 8px}
  .navbar-pill__links{gap:8px}
  .navbar-pill__link{font-size:12px}
  .navbar-pill__contact{font-size:12px;padding:6px 12px}
  .theme-toggle{display:none}
}
@media(max-width:480px){
  .home-logo{top:10px;left:16px}
  .nav-cluster{top:10px;right:12px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
<script>(function(){try{var e,t,n,s=window.innerWidth<=767;s?e=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light":(e=localStorage.getItem("portfolio-theme"),e||(t=new Date,n=t.getHours()+t.getMinutes()/60,e=n>=7.5&&n<18?"light":"dark")),document.documentElement.setAttribute("data-theme",e)}catch{document.documentElement.setAttribute("data-theme","dark")}})()</script>
</head>

<!-- CUSTOM CURSOR -->
<div class="curzr" hidden style="box-sizing:border-box;position:fixed;top:-15px;left:-15px;z-index:2147483647;width:30px;height:30px;border-radius:50%;overflow:visible;transition:200ms,transform 2.2ms;user-select:none;pointer-events:none;mix-blend-mode:difference">
  <svg viewBox="0 0 30 30" width="30" height="30">
    <defs><filter id="curzr-motion-blur" x="-100%" y="-100%" width="400%" height="400%"><feGaussianBlur class="curzr-motion-blur" in="SourceGraphic" stdDeviation="0,0"/></filter></defs>
    <circle cx="15" cy="15" r="10" fill="#fff" filter="url(#curzr-motion-blur)"/>

<script>
// Theme
(function() {
  const root = document.documentElement;
  const isMobile = () => window.innerWidth <= 767;
  function setTheme(t) { root.setAttribute("data-theme", t); if (!isMobile()) localStorage.setItem("portfolio-theme", t); }
  if (isMobile()) {
    const mq = window.matchMedia("(prefers-color-scheme: dark)");
    setTheme(mq.matches ? "dark" : "light");
    mq.addEventListener("change", e => setTheme(e.matches ? "dark" : "light"));
    return;
  }
  let cur = root.getAttribute("data-theme") || "dark";
  document.getElementById("theme-toggle")?.addEventListener("click", () => { cur = cur === "dark" ? "light" : "dark"; setTheme(cur); });
  window.addEventListener("storage", e => { if (e.key === "portfolio-theme" && e.newValue) { cur = e.newValue; root.setAttribute("data-theme", cur); }});
})();

// Scroll reveal
(function() {
  const els = document.querySelectorAll(".reveal");
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("visible"); obs.unobserve(e.target); }});
  }, { threshold: 0.07, rootMargin: "0px 0px -40px 0px" });
  els.forEach(el => obs.observe(el));
})();

// Page transitions
document.addEventListener("click", function(e) {
  const a = e.target.closest("a");
  if (!a) return;
  const href = a.getAttribute("href");
  if (!href || a.target === "_blank" || href.startsWith("http") || href.startsWith("#") || href.startsWith("mailto:")) return;
  if (e.metaKey || e.ctrlKey || e.shiftKey) return;
  e.preventDefault();
  document.body.classList.add("page-exiting");
  setTimeout(() => { window.location.href = href; }, 300);
});

// Custom cursor
(function() {
  if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
    const c = document.querySelector(".curzr"); if (c) c.remove(); return;
  }
  const el = document.querySelector(".curzr");
  const blur = document.querySelector(".curzr-motion-blur");
  if (!el || !blur) return;
  el.removeAttribute("hidden");
  document.body.style.cursor = "none";
  const svg = el.querySelector("svg");
  if (svg) { svg.style.transition="transform 0.2s cubic-bezier(0.2,0.8,0.2,1)"; svg.style.transformOrigin="center"; }
  document.body.querySelectorAll("button,a").forEach(n => {
    n.style.cursor = "none";
    n.addEventListener("mouseenter", () => { if (svg) svg.style.transform="scale(3)"; });
    n.addEventListener("mouseleave", () => { if (svg) svg.style.transform="scale(1)"; });
  });
  let prev={x:0,y:0}, rot=0, bt;
  document.onmousemove = e => {
    const nx=e.pageX+document.body.getBoundingClientRect().x, ny=e.pageY+document.body.getBoundingClientRect().y;
    const dx=Math.min(Math.max(prev.x-nx,-20),20), dy=Math.min(Math.max(prev.y-ny,-20),20);
    prev={x:nx,y:ny};
    el.style.transform=`translate3d(${nx}px,${ny}px,0)`;
    const angle=Math.atan(Math.abs(dy)/Math.abs(dx))*57.296;
    if(!isNaN(angle)){if(angle<=45){rot=dx*dy>=0?+angle:-angle;blur.setAttribute("stdDeviation",Math.abs(dx/2)+",0");}else{rot=dx*dy<=0?180-angle:angle;blur.setAttribute("stdDeviation",Math.abs(dy/2)+",0");}}
    el.style.transform+=` rotate(${rot}deg)`;
    clearTimeout(bt); bt=setTimeout(()=>blur.setAttribute("stdDeviation","0,0"),50);
  };
})();
</script>
